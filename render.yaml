services:
  - type: web
    name: ai-codebase-explainer-api
    runtime: python
    rootDir: apps/api
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DEMO_MODE
        value: "true"
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: MAX_REPO_SIZE_MB
        value: "25"
      - key: MAX_FILE_SIZE_KB
        value: "300"
      - key: MAX_FILES_ANALYZED
        value: "300"
      - key: OBSERVABILITY_ENABLED
        value: "false"
      - key: OBSERVABILITY_API_URL
        sync: false
      - key: OBSERVABILITY_INGEST_API_KEY
        sync: false
      - key: OBSERVABILITY_APP_NAME
        value: ai-codebase-explainer
