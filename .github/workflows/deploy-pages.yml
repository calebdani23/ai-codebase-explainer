name: Deploy web to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - uses: actions/configure-pages@v5
      - run: npm ci
      - name: Build static web app
        run: GITHUB_PAGES=true npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_DEMO_MODE: "true"
          VITE_REPO_URL: https://github.com/${{ github.repository }}
          VITE_OBSERVABILITY_DASHBOARD_URL: https://calebdani23.github.io/ai-agent-observability-dashboard/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
